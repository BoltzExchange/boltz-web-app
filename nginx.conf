server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Onion-Location header for browser Tor integration (RFC 7089 extension)
    # When set, browsers like Firefox/Brave show an "Onion Site Available" badge.
    # This value is substituted at container startup via envsubst.
    add_header Onion-Location "${ONION_LOCATION}$request_uri" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html =404;
    }

    # Redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
