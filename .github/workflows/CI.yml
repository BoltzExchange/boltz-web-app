name: CI

on: [push, pull_request]

permissions:
    contents: read

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - run: bun ci

            - run: bun run check:assets

            - run: bun run check:html-template

            - run: bun run lint

            - run: bun run lint:style

            - run: bun run prettier:check

            - run: bun run test
              env:
                  VITE_MEMPOOL_API_URL: ${{ vars.VITE_MEMPOOL_API_URL }}

            - run: bun run tsc

    package:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/boltz-swaps
        steps:
            - uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun ci
              working-directory: .

            - run: bun run lint

            - run: bun run prettier:check

            - run: bun run test

            - run: bun run tsc

            - run: bun run build

            - run: bun run check:lazy

            - run: bun run check:package

    package-integration:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Start regtest
              env:
                  ARBITRUM_E2E_RPC_URL: ${{ vars.ARBITRUM_E2E_RPC_URL }}
                  COMPOSE_PROFILES: webapp-ci
              run: |
                  git submodule init
                  git submodule update
                  chmod -R 777 regtest
                  git apply boltz.conf.patch
                  cd regtest
                  ./start.sh

            - name: Install dependencies
              run: bun ci

            - name: Run SDK integration tests
              working-directory: packages/boltz-swaps
              run: bun run test:integration

    e2e:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shardIndex: [1, 2, 3, 4]
                shardTotal: [4]
        steps:
            - uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Start regtest
              env:
                  ARBITRUM_E2E_RPC_URL: ${{ vars.ARBITRUM_E2E_RPC_URL }}
                  ETHEREUM_E2E_RPC_URL: ${{ vars.ETHEREUM_E2E_RPC_URL }}
                  COMPOSE_PROFILES: webapp-ci
              run: |
                  git submodule init
                  git submodule update
                  chmod -R 777 regtest
                  git apply boltz.conf.patch
                  cd regtest
                  ./start.sh

            - name: Install dependencies
              run: bun ci

            - name: Install Playwright Browsers
              run: bun run playwright:install

            - name: Run Playwright tests
              env:
                  ARBITRUM_E2E_RPC_URL: ${{ vars.ARBITRUM_E2E_RPC_URL }}
                  ETHEREUM_E2E_RPC_URL: ${{ vars.ETHEREUM_E2E_RPC_URL }}
                  CI: true
                  VITE_RSK_LOG_SCAN_ENDPOINT: "http://localhost:8545"
              run:
                  bun run test:e2e -- --shard=${{ matrix.shardIndex }}/${{
                  matrix.shardTotal }}

            - name: Upload blob report to GitHub Actions Artifacts
              if:
                  ${{ !cancelled() && github.server_url == 'https://github.com'
                  }}
              uses: actions/upload-artifact@v7
              with:
                  name: blob-report-${{ matrix.shardIndex }}
                  path: blob-report
                  retention-days: 1

    playwright-reports:
        if: ${{ !cancelled() && github.server_url == 'https://github.com' }}
        needs: [e2e]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - run: bun ci

            - name: Download blob reports from GitHub Actions Artifacts
              uses: actions/download-artifact@v8
              with:
                  path: all-blob-reports
                  pattern: blob-report-*
                  merge-multiple: true

            - name: Merge into HTML Report
              run:
                  bunx playwright merge-reports --reporter html
                  ./all-blob-reports

            - name: Upload HTML report
              uses: actions/upload-artifact@v7
              with:
                  name: html-report-attempt-${{ github.run_attempt }}
                  path: playwright-report
                  retention-days: 7
